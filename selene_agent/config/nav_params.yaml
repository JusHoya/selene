navigation:
  grid_resolution: 1.0
  grid_width: 500
  grid_height: 500
  origin_x: -250.0
  origin_y: -250.0
  max_traversable_slope_deg: 15.0
  slope_penalty_weight: 2.0
  hazard_penalty_weight: 10.0
  obstacle_inflation_radius: 0.5

path_follower:
  lookahead_distance: 2.0
  waypoint_tolerance: 1.0
  linear_kp: 0.5
  angular_kp: 1.5
  max_angular_speed: 1.0
  stall_timeout_s: 5.0

obstacle_avoidance:
  detection_range: 5.0
  critical_range: 1.5
  avoidance_gain: 0.8
  slow_factor: 0.3
  depth_image_bins: 16

mission:
  prospect_waypoints:
    - [-60, -120]
    - [-80, -140]
    - [-100, -150]
    - [-110, -170]
    - [-90, -130]
  recharge_position: [-50.0, -100.0]
  low_battery_threshold: 0.15
  recharge_target: 0.9


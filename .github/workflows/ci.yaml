name: SELENE CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base-jammy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            python3-colcon-common-extensions \
            python3-pip \
            ros-humble-geometry-msgs \
            ros-humble-nav-msgs \
            ros-humble-sensor-msgs \
            ros-humble-lifecycle-msgs \
            ros-humble-rosbridge-suite \
            ros-humble-std-msgs
          pip3 install pytest flake8 numpy scipy pydantic pyyaml

      - name: Build workspace
        shell: bash
        run: |
          mkdir -p /ros2_ws/src
          ln -s $GITHUB_WORKSPACE /ros2_ws/src/selene
          cd /ros2_ws
          source /opt/ros/humble/setup.bash
          colcon build --event-handlers console_direct+

      - name: Lint Python
        run: |
          flake8 --version
          flake8 selene_orchestrator/ selene_agent/ selene_hal/ selene_isru/ selene_sim/ \
            --max-line-length=100 \
            --exclude=__pycache__,build,install,log,.git,node_modules \
            --extend-ignore=W503,W504 \
            --select=E,W,F \
            --show-source \
            --statistics \
            --count

      - name: Run tests
        shell: bash
        run: |
          cd /ros2_ws
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          colcon test --event-handlers console_direct+
          colcon test-result --verbose
